apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-prod
  namespace: argocd
  labels:
    app: myapp
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.pagerduty: platform-oncall
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: deployments
    notifications.argoproj.io/subscribe.on-health-degraded.pagerduty: platform-oncall
spec:
  project: myapp-team
  source:
    repoURL: https://github.com/gMpHSpLB/Gitops-Argocd_1.git
    targetRevision: main
    path: .
    helm:
      valueFiles:
        - envs/prod/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: myapp-prod
  # Manual sync only — no automated, no selfHeal
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - Validate=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 2
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: ""
      kind: Secret
      name: myapp-tls
      jsonPointers:
        - /data