apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-staging
  namespace: argocd
  labels:
    app: myapp
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.slack: platform-alerts
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: deployments
    notifications.argoproj.io/subscribe.on-health-degraded.pagerduty: platform-oncall
spec:
  project: myapp-team
  # source:
  #   repoURL: https://github.com/gMpHSpLB/Gitops-Argocd_1.git
  #   targetRevision: main
  #   path: .
  #   helm:
  #     valueFiles:
  #       - envs/staging/values.yaml
  sources:   # ArgoCD 2.6+ multi-source
    # Source 1: Helm chart from OCI (GHCR)
    - repoURL: oci://ghcr.io/gmphsplb/helm-lab
      chart: myapp
      targetRevision: "1.0.0"
      helm:
        # Values are provided by the second source via $values
        valueFiles:
          - $values/envs/staging/values.yaml
    # Source 2: GitOps repo with per-environment values      
    - repoURL: https://github.com/gMpHSpLB/Gitops-Argocd_1.git
      targetRevision: main
      ref: values   # defines $values for the first source  
  destination:
    server: https://kubernetes.default.svc
    namespace: myapp-staging
  # NO syncPolicy.automated — staging requires manual sync
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - Validate=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    # cert-manager rotates TLS — ignore diff on Secret data
    - group: ""
      kind: Secret
      name: myapp-tls
      jsonPointers:
        - /data